name: .NET CI + GitHub Packages

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack NuGet package
        run: dotnet pack --no-build --configuration Release --output ./dist

      - name: Create artifact archive
        run: tar -czf dist/ci-artifact-${GITHUB_SHA}.tar.gz -C dist *.nupkg 2>/dev/null || echo "No nupkg files generated"

      - name: Upload artifact to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifact-${{ github.sha }}
          path: dist/*.nupkg
          if-no-files-found: warn

      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source --username USERNAME --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github https://nuget.pkg.github.com/$(echo "${{ github.repository }}" | cut -d/ -f1)/index.json
          dotnet nuget push "dist/*.nupkg" --source github --skip-duplicate
